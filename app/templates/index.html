<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Fraud Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Credit Card Fraud Detector</h1>
        <p class="subtitle">Enter a transaction's Time and Amount to check it.
           (V1-V28 default to 0 for this quick demo form.)</p>

        <form id="predict-form">
            <label for="time">Time (seconds since first transaction)</label>
            <input type="number" id="time" name="Time" step="any" value="0" required>

            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" name="Amount" step="any" value="100" required>

            <button type="submit">Check Transaction</button>
        </form>

        <div id="result" class="result-box" style="display:none;"></div>
    </div>

    <script>
        const form = document.getElementById("predict-form");
        const resultBox = document.getElementById("result");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const payload = {
                Time: parseFloat(document.getElementById("time").value),
                Amount: parseFloat(document.getElementById("amount").value)
            };
            // V1-V28 are left out here; the API defaults them to 0.

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            resultBox.style.display = "block";
            resultBox.className = "result-box " + (data.is_fraud ? "fraud" : "safe");
            resultBox.innerHTML = `
                <strong>${data.is_fraud ? "⚠️ Likely Fraud" : "✅ Looks Safe"}</strong><br>
                Fraud probability: ${(data.fraud_probability * 100).toFixed(2)}%
            `;
        });
    </script>
</body>
</html>
